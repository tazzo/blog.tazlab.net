# -- Theme Options --
# These options control how the theme functions and allow you to
# customise the display of your website.
#
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "blowfish"
mainSections = ["posts"]
Logo = "img/logo.png"
defaultAppearance = "dark"
defaultBackgroundImage = "background.jpg" # SFONDO GLOBALE

[main]
  autoSwitchAppearance = true
  smartTOC = true # Attiva l'evidenziazione intelligente della scaletta
  smartTOCHideUnfocusedChildren = true # Nasconde le sottosezioni non attive per pulizia

  enableA11y = true
  enableSearch = true
  enableCodeCopy = true
  enableStructuredBreadcrumbs = true
  replyByEmail = false

disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false
hotlinkFeatureImage = false
fingerprintAlgorithm = "sha512" # Valid values are "sha512" (default), "sha384", "sha256"

giteaDefaultServer = "https://git.fsfe.org"
forgejoDefaultServer = "https://v11.next.forgejo.org"

[header]
  layout = "fixed-fill-blur" # valid options: basic, fixed, fixed-fill, fixed-gradient, fixed-fill-blur

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "background" # Cambiato da profile a background per supportare lo sfondo immersivo
  homepageImage = "homepage-background.jpg" # Hugo lo cercherà in assets/
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = true # Attiva l'effetto sfumato allo scroll

# Opzioni generali del tema
  enableInwardScroll = true
  enableCanvas = false # Resta pulito, senza puntini

[article]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = false 
  showBreadcrumbs = false
  showDraftLabel = true
  showEdit = false
  editAppendPath = true
  seriesOpened = false
  showHeadingAnchors = true
  showPagination = true
  invertPagination = false
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true # use showTaxonomies OR showCategoryOnly, not both
  showCategoryOnly = false # use showTaxonomies OR showCategoryOnly, not both
  showAuthorsBadges = false
  showWordCount = true
  showZenMode = false
  showComments = true

[list]
  showHero = false
  layoutBackgroundBlur = true 
  layoutBackgroundHeaderSpace = false 
  showBreadcrumbs = false
  showSummary = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  showCards = true
  showTaxonomies = true
  orderByWeight = false
  groupByYear = true
  cardView = false
  cardViewScreenWidth = false
  constrainItemsWidth = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showHero = false
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  showTaxonomies = true
  cardView = false

[term]
  showHero = false
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = true
  showTaxonomies = true
  groupByYear = false
  cardView = false
  cardViewScreenWidth = false

